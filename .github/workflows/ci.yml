name: CI

on:
  push:
    branches: [master, feature/*]
  pull_request:
    branches: [master]

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            compiler: gcc
          - os: ubuntu-latest
            compiler: clang
          - os: macos-latest
            compiler: clang
          - os: windows-latest
            compiler: msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --config Release -j ${{ env.NUM_JOBS || '4' }}
        env:
          NUM_JOBS: ${{ runner.os == 'Linux' && '$(nproc)' || runner.os == 'macOS' && '$(sysctl -n hw.ncpu)' || '4' }}

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release
